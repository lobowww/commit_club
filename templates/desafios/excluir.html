{% extends 'base.html' %}

{% block title %}Excluir Desafio{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">
    <div class="glass border border-red-500/20 rounded-2xl p-6 sm:p-8 text-center animate-slide-up">
        <div class="text-5xl mb-4">⚠️</div>
        <h1 class="text-2xl font-extrabold text-white mb-2">Excluir Desafio?</h1>
        <p class="text-gray-400 text-sm mb-6">
            Você tem certeza que deseja excluir o desafio <strong class="text-white">{{ desafio.titulo }}</strong>? Esta ação não pode ser desfeita.
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <button type="submit" class="w-full py-3.5 rounded-xl text-sm font-bold bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 transition-all">
                Sim, quero excluir definitivamente
            </button>
            <a href="{% url 'detalhe_desafio' desafio.id %}" class="block w-full py-3.5 rounded-xl text-sm font-bold bg-white/5 border border-white/10 text-white hover:bg-white/10 transition-all">
                Cancelar e Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
